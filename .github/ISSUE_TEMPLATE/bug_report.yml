name: Bug Report
description: Report a bug in Buddi
labels: ['type: bug', 'status: needs triage']

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please search [existing issues](https://github.com/talkvalue/Buddi/issues) first.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is. Include screenshots if applicable.
      placeholder: Bug description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Buddi
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.3 Sequoia"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - MacBook with notch
        - MacBook without notch
        - External display
        - Other
    validations:
      required: true

  - type: input
    id: buddi-version
    attributes:
      label: Buddi version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant log output.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help.
